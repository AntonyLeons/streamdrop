version: "3.9"

services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    # Use host networking to bypass the massive CPU overhead of docker-proxy
    network_mode: "host"

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  bun:
    build: .
    container_name: streamdrop
    restart: unless-stopped
    network_mode: "host"
    depends_on:
      - redis

    environment:
      - TURN_SERVER=${TURN_SERVER:-}
      - TURN_SECRET=${TURN_SECRET:-}
      - MAX_RECEIVERS=${MAX_RECEIVERS:-2000}
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379}
      - BANDWIDTH_LIMIT_GB=${BANDWIDTH_LIMIT_GB:-10}
      - BAN_DURATION_HOURS=${BAN_DURATION_HOURS:-24}

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped
    network_mode: "host"
    command: redis-server --save 60 1 --maxmemory 256mb --maxmemory-policy allkeys-lru

  coturn:
    image: coturn/coturn
    container_name: coturn
    restart: unless-stopped
    network_mode: "host"

    command: >
      -n
      --listening-port=3478
      --listening-ip=0.0.0.0
      --fingerprint
      --lt-cred-mech
      --realm=${TURN_REALM:-streamdrop}
      --static-auth-secret=${TURN_SECRET:-}
      --total-quota=${MAX_RECEIVERS:-2000}
      --user-quota=${TURN_USER_QUOTA:-50}
      --max-bps=${TURN_MAX_BPS:-100000000}
      --stale-nonce=600
      --min-port=49152
      --max-port=65535
      --verbose

volumes:
  caddy_data:
  caddy_config:
