name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Run linter/typecheck
        run: bun run check
      - name: Run unit tests
        run: bun run test
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        run: bun run test:e2e

  build:
    needs: test
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs_on: ubuntu-latest
            ext: ""
            pack: tar
          - name: macos-x64
            runs_on: macos-13
            ext: ""
            pack: tar
          - name: macos-arm64
            runs_on: macos-14
            ext: ""
            pack: tar
          - name: windows-x64
            runs_on: windows-latest
            ext: ".exe"
            pack: zip

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build CLI
        run: bun build cli/index.ts --compile --target bun-${{ matrix.name }} --outfile dist/streamdrop-cli${{ matrix.ext }}

      - name: Build Server
        run: bun build src/server.ts --compile --target bun-${{ matrix.name }} --outfile dist/streamdrop-server${{ matrix.ext }}

      - name: Build NPM Package
        if: matrix.name == 'linux-x64'
        run: bun run cli:build-npm

      - name: Prepare Binaries
        id: prepare_bin
        shell: bash
        run: |
          cd dist
          mv "streamdrop-cli${{ matrix.ext }}" "streamdrop-cli-${{ matrix.name }}${{ matrix.ext }}"
          mv "streamdrop-server${{ matrix.ext }}" "streamdrop-server-${{ matrix.name }}${{ matrix.ext }}"
          
          shasum -a 256 "streamdrop-cli-${{ matrix.name }}${{ matrix.ext }}" | awk '{print $1}' > "streamdrop-cli-${{ matrix.name }}${{ matrix.ext }}.sha256"
          shasum -a 256 "streamdrop-server-${{ matrix.name }}${{ matrix.ext }}" | awk '{print $1}' > "streamdrop-server-${{ matrix.name }}${{ matrix.ext }}.sha256"
          
          echo "file1=dist/streamdrop-cli-${{ matrix.name }}${{ matrix.ext }}" >> "$GITHUB_OUTPUT"
          echo "sha1=dist/streamdrop-cli-${{ matrix.name }}${{ matrix.ext }}.sha256" >> "$GITHUB_OUTPUT"
          echo "file2=dist/streamdrop-server-${{ matrix.name }}${{ matrix.ext }}" >> "$GITHUB_OUTPUT"
          echo "sha2=dist/streamdrop-server-${{ matrix.name }}${{ matrix.ext }}.sha256" >> "$GITHUB_OUTPUT"
          
          if [ "${{ matrix.name }}" == "linux-x64" ]; then
            cd ..
            tar -czf streamdrop-cli-npm.tar.gz cli-pkg/
            echo "npm_pkg=streamdrop-cli-npm.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ${{ steps.prepare_bin.outputs.file1 }}
            ${{ steps.prepare_bin.outputs.sha1 }}
            ${{ steps.prepare_bin.outputs.file2 }}
            ${{ steps.prepare_bin.outputs.sha2 }}
            ${{ steps.prepare_bin.outputs.npm_pkg }}

  publish-managers:
    name: Publish to Package Managers
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6

      - name: Fetch Release SHAs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV
          
          # Download all the .sha256 files and the NPM package from the current release
          gh release download $TAG -p "*.sha256"
          gh release download $TAG -p "streamdrop-cli-npm.tar.gz"
          
          # Read SHAs into environment variables
          echo "MAC_INTEL_SHA=$(cat streamdrop-cli-macos-x64.sha256)" >> $GITHUB_ENV
          echo "MAC_ARM_SHA=$(cat streamdrop-cli-macos-arm64.sha256)" >> $GITHUB_ENV
          echo "LINUX_INTEL_SHA=$(cat streamdrop-cli-linux-x64.sha256)" >> $GITHUB_ENV
          echo "WIN_INTEL_SHA=$(cat streamdrop-cli-windows-x64.exe.sha256)" >> $GITHUB_ENV

      - name: Setup Node for NPM Publish
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          tar -xzf streamdrop-cli-npm.tar.gz
          cd cli-pkg
          npm version $VERSION --allow-same-version --no-git-tag-version
          npm publish --access public

      - name: Update Package Managers (Homebrew & Scoop)
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.PAT_TOKEN }}
          path: pkg-repo

      - name: Push Updates
        run: |
          cd pkg-repo
          
          # Process Homebrew Template
          if [ -f Formula/streamdrop-cli.rb.template ]; then
            envsubst < Formula/streamdrop-cli.rb.template > Formula/streamdrop-cli.rb
            git add Formula/streamdrop-cli.rb
          fi
          
          # Process Scoop Template
          if [ -f bucket/streamdrop-cli.json.template ]; then
            envsubst < bucket/streamdrop-cli.json.template > bucket/streamdrop-cli.json
            git add bucket/streamdrop-cli.json
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Bump streamdrop-cli to ${{ github.event.release.tag_name }}" || echo "No changes to commit"
          git push

  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max