name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runs_on: ubuntu-latest
            ext: ""
            pack: tar
          - name: macos-x64
            runs_on: macos-13
            ext: ""
            pack: tar
          - name: macos-arm64
            runs_on: macos-14
            ext: ""
            pack: tar
          - name: windows-x64
            runs_on: windows-latest
            ext: ".exe"
            pack: zip

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build CLI
        run: bun build cli/index.ts --compile --outfile dist/streamdrop-cli${{ matrix.ext }}

      - name: Build Server
        run: bun build src/server.ts --compile --outfile dist/streamdrop-server${{ matrix.ext }}

      - name: Build NPM Package
        if: matrix.name == 'linux-x64'
        run: bun run cli:build-npm

      - name: Prepare Binaries
        id: prepare_bin
        shell: bash
        run: |
          cd dist
          mv "streamdrop-cli${{ matrix.ext }}" "streamdrop-cli-${{ matrix.name }}${{ matrix.ext }}"
          mv "streamdrop-server${{ matrix.ext }}" "streamdrop-server-${{ matrix.name }}${{ matrix.ext }}"
          
          shasum -a 256 "streamdrop-cli-${{ matrix.name }}${{ matrix.ext }}" | awk '{print $1}' > "streamdrop-cli-${{ matrix.name }}${{ matrix.ext }}.sha256"
          shasum -a 256 "streamdrop-server-${{ matrix.name }}${{ matrix.ext }}" | awk '{print $1}' > "streamdrop-server-${{ matrix.name }}${{ matrix.ext }}.sha256"
          
          echo "file1=dist/streamdrop-cli-${{ matrix.name }}${{ matrix.ext }}" >> "$GITHUB_OUTPUT"
          echo "sha1=dist/streamdrop-cli-${{ matrix.name }}${{ matrix.ext }}.sha256" >> "$GITHUB_OUTPUT"
          echo "file2=dist/streamdrop-server-${{ matrix.name }}${{ matrix.ext }}" >> "$GITHUB_OUTPUT"
          echo "sha2=dist/streamdrop-server-${{ matrix.name }}${{ matrix.ext }}.sha256" >> "$GITHUB_OUTPUT"
          
          if [ "${{ matrix.name }}" == "linux-x64" ]; then
            cd ..
            tar -czf streamdrop-cli-npm.tar.gz cli-pkg/
            echo "npm_pkg=streamdrop-cli-npm.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ${{ steps.prepare_bin.outputs.file1 }}
            ${{ steps.prepare_bin.outputs.sha1 }}
            ${{ steps.prepare_bin.outputs.file2 }}
            ${{ steps.prepare_bin.outputs.sha2 }}
            ${{ steps.prepare_bin.outputs.npm_pkg }}

  publish-managers:
    name: Publish to Package Managers
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Release SHAs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV
          
          # Download all the .sha256 files from the current release
          gh release download $TAG -p "*.sha256"
          
          # Read SHAs into environment variables
          echo "MAC_INTEL_SHA=$(cat streamdrop-cli-macos-x64.sha256)" >> $GITHUB_ENV
          echo "MAC_ARM_SHA=$(cat streamdrop-cli-macos-arm64.sha256)" >> $GITHUB_ENV
          echo "LINUX_INTEL_SHA=$(cat streamdrop-cli-linux-x64.sha256)" >> $GITHUB_ENV
          echo "WIN_INTEL_SHA=$(cat streamdrop-cli-windows-x64.exe.sha256)" >> $GITHUB_ENV


      - name: Update Package Managers (Homebrew & Scoop)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-tap
          token: ${{ secrets.PAT_TOKEN }}
          path: pkg-repo

      - name: Push Updates
        run: |
          cd pkg-repo
          
          # Process Homebrew Template
          if [ -f Formula/streamdrop-cli.rb.template ]; then
            envsubst < Formula/streamdrop-cli.rb.template > Formula/streamdrop-cli.rb
            git add Formula/streamdrop-cli.rb
          fi
          
          # Process Scoop Template
          if [ -f bucket/streamdrop-cli.json.template ]; then
            envsubst < bucket/streamdrop-cli.json.template > bucket/streamdrop-cli.json
            git add bucket/streamdrop-cli.json
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Bump streamdrop-cli to ${{ github.event.release.tag_name }}" || echo "No changes to commit"
          git push
